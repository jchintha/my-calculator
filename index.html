<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="calculator">
    <h1>My Calculator</h1>
    <input id="display" type="text" readonly value="0" aria-label="display" />
    <div class="keys">
      <button data-action="clear" class="span-2">C</button>
      <button data-action="back">←</button>
      <button data-op="/">÷</button>

      <button data-digit="7">7</button>
      <button data-digit="8">8</button>
      <button data-digit="9">9</button>
      <button data-op="*">×</button>

      <button data-digit="4">4</button>
      <button data-digit="5">5</button>
      <button data-digit="6">6</button>
      <button data-op="-">−</button>

      <button data-digit="1">1</button>
      <button data-digit="2">2</button>
      <button data-digit="3">3</button>
      <button data-op="+">+</button>

      <button data-digit="0" class="span-2">0</button>
      <button data-action="dot">.</button>
      <button data-action="equals" class="equals">=</button>
    </div>
  </main>
  <script src="app.js"></script>
</body>
</html>
